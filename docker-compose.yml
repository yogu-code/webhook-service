version: '3'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET="yogu@10089"
      - PORT=8080
      - DATABASE_URL=postgresql://yogu:yogu0019@postgres:5432/webhook
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
  worker:
    build: .
    command: 
      - node dist/worker.js
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://yogu:yogu0019@postgres:5432/webhook
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=yogu
      - POSTGRES_PASSWORD=yogu0019
      - POSTGRES_DB=webhook
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres-data: